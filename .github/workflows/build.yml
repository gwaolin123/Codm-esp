name: Build CODM ESP APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Dump full repo structure
        run: find . -type f | sort | head -150
        
      - name: Detect build system
        run: |
          echo "=== GRADLE ==="
          find . -maxdepth 3 -name "build.gradle*" -o -name "gradlew" -o -name "settings.gradle"
          echo "=== CMAKE/NDK ==="
          find . -maxdepth 3 -name "CMakeLists.txt" -o -name "Android.mk"
          echo "=== FLUTTER ==="
          test -f "pubspec.yaml" && echo "FLUTTER DETECTED"
          echo "=== UNITY EXPORT ==="
          find . -maxdepth 3 -name "AndroidManifest.xml"
          
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        
      - name: Build with Gradle (try all variants)
        run: |
          if [ -f "gradlew" ]; then
            chmod +x gradlew
            ./gradlew tasks --all | grep -i "assemble" | head -20
            ./gradlew assembleDebug || ./gradlew assemble || ./gradlew build
          else
            echo "NO GRADLEW FOUND"
            find . -name "gradlew"
          fi
          
      - name: Hunt for APKs everywhere
        run: |
          echo "=== ALL APK FILES ==="
          find . -name "*.apk" -type f
          echo "=== ALL AAB FILES ==="
          find . -name "*.aab" -type f
          echo "=== BUILD OUTPUTS DUMP ==="
          find . -path "*/build/outputs/*" -type f 2>/dev/null || true
          find . -path "*/build/apk/*" -type f 2>/dev/null || true
          
      - name: Upload any APK found
        uses: actions/upload-artifact@v4
        with:
          name: codm-esp-apk
          path: ./**/*.apk
          if-no-files-found: error
