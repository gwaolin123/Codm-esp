name: Build CODM ESP APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Scan entire repo
        run: |
          echo "=== ALL FILES ===" > scan.txt
          find . -type f | sort >> scan.txt
          echo "" >> scan.txt
          echo "=== ROOT FILES ===" >> scan.txt
          ls -la >> scan.txt
          echo "" >> scan.txt
          echo "=== ANY APK ALREADY IN REPO ===" >> scan.txt
          find . -name "*.apk" >> scan.txt || true
          echo "" >> scan.txt
          echo "=== ANY BUILD FILES ===" >> scan.txt
          find . -name "build.gradle*" -o -name "gradlew" -o -name "CMakeLists.txt" -o -name "Android.mk" -o -name "pom.xml" -o -name "pubspec.yaml" >> scan.txt || true
          cat scan.txt
          
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        continue-on-error: true
        
      - name: Attempt Gradle build
        run: |
          if [ -f "gradlew" ]; then
            chmod +x gradlew
            echo "=== GRADLE TASKS ===" >> build.log
            ./gradlew tasks --all 2>&1 | head -50 >> build.log || true
            echo "=== ASSEMBLE DEBUG ===" >> build.log
            ./gradlew assembleDebug 2>&1 >> build.log || true
            echo "=== ASSEMBLE RELEASE ===" >> build.log
            ./gradlew assembleRelease 2>&1 >> build.log || true
            echo "=== BUILD ===" >> build.log
            ./gradlew build 2>&1 >> build.log || true
          else
            echo "NO GRADLEW FOUND" >> build.log
            find . -name "gradlew" >> build.log || true
          fi
          echo "=== POST-BUILD APK HUNT ===" >> build.log
          find . -name "*.apk" -type f >> build.log || true
          echo "=== POST-BUILD ALL OUTPUTS ===" >> build.log
          find . -path "*/build/*" -type f 2>/dev/null | head -100 >> build.log || true
          cat build.log
          
      - name: Upload repo scan
        uses: actions/upload-artifact@v4
        with:
          name: repo-scan
          path: scan.txt
          
      - name: Upload build logs
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build.log
          
      - name: Upload any APK found
        uses: actions/upload-artifact@v4
        with:
          name: codm-apk
          path: ./**/*.apk
          if-no-files-found: warn
