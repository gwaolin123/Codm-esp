name: Build CODM ESP APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Dump repo structure
        run: find . -type f | sort
        continue-on-error: true
        
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        continue-on-error: true
        
      - name: Find and run build
        run: |
          if [ -f "gradlew" ]; then
            chmod +x gradlew
            echo "=== GRADLE TASKS ==="
            ./gradlew tasks --all 2>&1 | head -40 || true
            echo "=== BUILDING ==="
            ./gradlew assembleDebug 2>&1 || ./gradlew assemble 2>&1 || ./gradlew build 2>&1 || true
          else
            echo "NO GRADLEW - searching for alternatives"
            find . -name "gradlew" 2>/dev/null
            find . -name "*.gradle" -maxdepth 3 2>/dev/null
          fi
        continue-on-error: true
        
      - name: Find all outputs
        run: |
          echo "=== APKs ==="
          find . -name "*.apk" -type f 2>/dev/null || true
          echo "=== AABs ==="
          find . -name "*.aab" -type f 2>/dev/null || true
          echo "=== BUILD DIRS ==="
          find . -path "*/build/*" -type f 2>/dev/null | head -50 || true
          echo "=== ALL OUTPUT FILES ==="
          find . -path "*/outputs/*" -type f 2>/dev/null || true
        continue-on-error: true
        
      - name: Upload APK if found
        uses: actions/upload-artifact@v4
        with:
          name: codm-apk
          path: ./**/*.apk
          if-no-files-found: warn
          
      - name: Upload build logs if no APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-debug-logs
          path: |
            ./**/build/
            ./**/*.log
          if-no-files-found: warn
